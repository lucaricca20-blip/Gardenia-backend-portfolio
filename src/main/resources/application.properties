spring.application.name=Gardenia_Backend

logging.level.root=info
logging.level.com.betacom=debug

logging.file=./jpa.log
logging.pattern.console=  %d{"yyyy/MM/dd HH:mm:ss,SSS"} [%p] [%t] %M\\(%F:%L\\) - %msg%n

spring.datasource.url=jdbc:postgresql://localhost:5432/db_gardenia
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}


spring.jpa.show-sql= false

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.format_sql=true

spring.mvc.static-path-pattern=/uploads/**

spring.web.resources.static-locations=file:uploads/
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
lang=IT
